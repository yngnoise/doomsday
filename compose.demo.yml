name: doomsday-demo

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: doomsday
      POSTGRES_USER: doomsday
      POSTGRES_PASSWORD: local-demo-postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doomsday -d doomsday"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    environment:
      APP_ENV: production
      DATABASE_URL: postgres://doomsday:local-demo-postgres@postgres:5432/doomsday?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:?PAYMENT_WEBHOOK_SECRET is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      PORT: "8080"
      SITE_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      DEMO_MODE: "true"
      DEMO_OTP_CODE: "424242"
      DEMO_RESET_ON_START: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 12
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
      args:
        API_ORIGIN: http://api:8080
        NEXT_PUBLIC_DROP_ID: demo-wraith-jacket
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 12
    ports:
      - "3000:3000"

volumes:
  postgres-data:
