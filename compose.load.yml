name: doomsday-load

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: doomsday_load
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doomsday_load"]
      interval: 2s
      timeout: 2s
      retries: 30

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.12.0
    ports:
      - "18474:8474"

  toxiproxy-config:
    image: curlimages/curl:8.14.1
    volumes:
      - ./loadtest/configure-toxiproxy.sh:/configure-toxiproxy.sh:ro
    entrypoint: ["/bin/sh", "/configure-toxiproxy.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      toxiproxy:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    environment:
      APP_ENV: production
      DATABASE_URL: postgres://postgres:postgres@toxiproxy:15432/doomsday_load?sslmode=disable
      REDIS_URL: redis://toxiproxy:16379/0
      JWT_SECRET: load-test-jwt-secret-with-at-least-32-characters
      PAYMENT_WEBHOOK_SECRET: load-test-payment-secret-with-at-least-32-characters
      ADMIN_PASSWORD: load-test-admin-password
      PORT: "8080"
      SITE_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      DEMO_MODE: "true"
      DEMO_OTP_CODE: "424242"
      DEMO_RESET_ON_START: "true"
      LOG_LEVEL: warn
    depends_on:
      toxiproxy-config:
        condition: service_completed_successfully
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/ready"]
      interval: 2s
      timeout: 2s
      retries: 45

  k6:
    profiles: ["load"]
    build:
      context: .
      dockerfile: loadtest/Dockerfile.k6
    environment:
      BASE_URL: http://api:8080
      LOAD_DROP_ID: demo-wraith-jacket
      LOAD_JWT_SECRET: load-test-jwt-secret-with-at-least-32-characters
      LOAD_ADMIN_PASSWORD: load-test-admin-password
    volumes:
      - ./loadtest:/scripts:ro
      - ./loadtest/results:/results
    depends_on:
      api:
        condition: service_healthy
